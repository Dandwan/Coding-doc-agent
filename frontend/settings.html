<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DocAgent | 全局设置</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&family=Sora:wght@400;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/assets/style.css" />
  </head>
  <body>
    <div class="page-shell">
      <header class="topbar">
        <div class="brand">
          <h1>DocAgent · 全局设置</h1>
          <p>配置项目根目录、API 端点与文档路径规则</p>
        </div>
        <div class="toolbar">
          <button id="go-home" class="secondary">返回主页</button>
        </div>
      </header>

      <main class="panel stack">
        <label>
          默认项目根目录
          <div class="path-input-row">
            <input id="projects-root" type="text" />
            <button id="pick-projects-root" type="button" class="secondary">选择文件夹</button>
          </div>
        </label>

        <h3>日志设置</h3>
        <label>
          日志保存根目录
          <div class="path-input-row">
            <input id="log-root-dir" type="text" />
            <button id="pick-log-root-dir" type="button" class="secondary">选择文件夹</button>
          </div>
        </label>

        <h3>API 配置</h3>
        <label>
          API URL
          <input id="api-url" type="text" />
        </label>
        <label>
          API Key
          <input id="api-key" type="password" />
        </label>
        <label>
          模型名称
          <input id="api-model" type="text" />
        </label>
        <label>
          Temperature
          <input id="api-temperature" type="number" step="0.1" min="0" max="2" />
        </label>
        <label>
          Timeout（秒）
          <input id="api-timeout" type="number" min="5" max="600" />
        </label>
        <label>
          重试次数
          <input id="api-retries" type="number" min="1" max="8" />
        </label>

        <h3>并行生成设置</h3>
        <label>
          并行生成并发数（generation.concurrent_workers）
          <input id="generation-concurrent-workers" type="number" min="1" max="20" />
        </label>

        <h3>文档路径规则</h3>
        <label>
          项目开发文档路径（project_doc）
          <div class="path-input-row">
            <input id="project-doc-path" type="text" />
            <button id="pick-project-doc-path" type="button" class="secondary">选目录并填入 PROJECT.md</button>
          </div>
        </label>
        <label>
          Agent 开发文档目录（agent_doc_dir）
          <div class="path-input-row">
            <input id="agent-doc-dir" type="text" />
            <button id="pick-agent-doc-dir" type="button" class="secondary">选择文件夹</button>
          </div>
        </label>

        <h3>积极上传默认策略</h3>
        <label class="checkbox-line">
          <input id="global-proactive-push-enabled" type="checkbox" />
          默认启用“积极上传”（每开发完一个新功能就提交上传）
        </label>
        <label>
          默认上传分支（可留空）
          <input id="global-proactive-push-branch" type="text" placeholder="例如：main / release/v1" />
        </label>
        <label>
          积极上传指令文案（proactive_push_instruction）
          <textarea
            id="global-proactive-push-instruction"
            placeholder="请你积极上传，每当开发完一个功能，则进行一次上传"
          ></textarea>
        </label>

        <h3>提示词设置</h3>
        <label>
          1) 识别需求不清晰点提示词
          <textarea id="clarify-prompt-template" placeholder="用于指导 AI 识别需求歧义"></textarea>
        </label>
        <label>
          2) 生成选项提示词
          <textarea id="options-prompt-template" placeholder="用于指导 AI 生成选项"></textarea>
        </label>
        <label>
          3) 生成最终 Agent 开发文档提示词
          <textarea id="final-doc-prompt-template" placeholder="用于指导 AI 生成最终 Markdown 文档"></textarea>
        </label>

        <h3>替换符设置</h3>
        <label>
          项目开发文档替换符
          <input id="ph-project-document" type="text" />
        </label>
        <label>
          用户输入替换符
          <input id="ph-user-input" type="text" />
        </label>
        <label>
          历史问答替换符
          <input id="ph-question-and-input" type="text" />
        </label>

        <h3>标识符设置</h3>
        <label>
          问题开始标识
          <input id="marker-question-open" type="text" />
        </label>
        <label>
          问题结束标识
          <input id="marker-question-close" type="text" />
        </label>
        <label>
          选项开始标识
          <input id="marker-option-open" type="text" />
        </label>
        <label>
          选项结束标识
          <input id="marker-option-close" type="text" />
        </label>

        <div class="actions">
          <button id="save-config" class="teal">保存设置</button>
        </div>
        <div id="settings-message" class="message"></div>
      </main>
    </div>

    <script src="/assets/settings.js"></script>
  </body>
</html>
